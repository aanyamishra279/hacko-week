<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography Gallery</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&amp;family=Montserrat:wght@300;400;500&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201, 169, 97, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(201, 169, 97, 0); }
    }
    
    .gallery-item {
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
    }
    
    .gallery-item:nth-child(1) { animation-delay: 0.1s; }
    .gallery-item:nth-child(2) { animation-delay: 0.2s; }
    .gallery-item:nth-child(3) { animation-delay: 0.3s; }
    .gallery-item:nth-child(4) { animation-delay: 0.4s; }
    .gallery-item:nth-child(5) { animation-delay: 0.5s; }
    .gallery-item:nth-child(6) { animation-delay: 0.6s; }
    .gallery-item:nth-child(7) { animation-delay: 0.7s; }
    .gallery-item:nth-child(8) { animation-delay: 0.8s; }
    .gallery-item:nth-child(9) { animation-delay: 0.9s; }
    
    .lightbox-overlay {
      animation: fadeIn 0.3s ease-out;
    }
    
    .lightbox-image {
      animation: scaleIn 0.3s ease-out;
    }
    
    .image-wrapper {
      position: relative;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .image-wrapper:hover {
      transform: translateY(-8px);
    }

    .image-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201, 169, 97, 0.2) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      border-radius: 1rem;
    }
    
    .image-wrapper:hover::after {
      opacity: 1;
    }

    .gallery-item:hover {
      animation: pulse-glow 2s infinite;
    }

    h1 {
      background: linear-gradient(135deg, #f5f5f0 0%, #c9a961 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.08em;
      font-weight: 300;
    }

    header {
      animation: fadeInUp 1s ease-out;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="min-h-full w-full flex flex-col overflow-auto" style="background-color: #0a0a0a;"><!-- Header -->
   <header class="text-center py-16 md:py-24 px-6 relative overflow-hidden">
    <div class="absolute inset-0 -z-10 opacity-20" style="background: radial-gradient(circle at 50% 50%, #c9a961 0%, transparent 70%);"></div>
    <div class="mb-8"><span class="inline-block text-4xl mb-4">✨</span>
    </div>
    <h1 id="gallery-title" class="text-5xl md:text-7xl font-light tracking-wider mb-6" style="font-family: 'Cormorant Garamond', serif;">Photography Gallery</h1>
    <p id="gallery-subtitle" class="text-lg md:text-xl font-light tracking-widest uppercase mb-8" style="font-family: 'Montserrat', sans-serif; color: #8a8a85;">A collection of my favorite moments</p>
    <div class="flex justify-center gap-2">
     <div class="w-2 h-2 rounded-full" style="background-color: #c9a961; animation: float 2s ease-in-out infinite;"></div>
     <div class="w-12 h-px" style="background: linear-gradient(90deg, #c9a961, transparent);"></div>
     <div class="w-2 h-2 rounded-full" style="background-color: #c9a961; animation: float 2s ease-in-out infinite 0.3s;"></div>
    </div>
   </header><!-- Gallery Grid -->
   <main class="flex-1 px-4 md:px-8 lg:px-16 pb-16">
    <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 max-w-7xl mx-auto">
     <!-- Gallery items will be generated by JS -->
    </div>
   </main><!-- Footer -->
   <footer class="py-12 text-center border-t relative overflow-hidden" style="border-color: #1a1a1a;">
    <div class="absolute inset-0 -z-10 opacity-10" style="background: linear-gradient(90deg, transparent, #c9a961, transparent);"></div>
    <p id="footer-text" class="text-sm tracking-widest mb-3" style="font-family: 'Montserrat', sans-serif; color: #5a5a55;">© 2026 Photographer Portfolio</p>
    <p style="font-family: 'Montserrat', sans-serif; color: #8a8a85; font-size: 0.875rem;">Made with <span style="color: #c9a961;">♥</span> and pixels</p>
   </footer><!-- Lightbox Modal -->
   <div id="lightbox" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background-color: rgba(0,0,0,0.95);">
    <div class="lightbox-overlay absolute inset-0" onclick="closeLightbox()"></div><!-- Close Button --> <button onclick="closeLightbox()" class="absolute top-6 right-6 z-10 w-12 h-12 flex items-center justify-center rounded-full transition-all duration-300 hover:scale-110" style="background-color: rgba(201, 169, 97, 0.15); color: #f5f5f0; border: 1px solid rgba(201, 169, 97, 0.3);" aria-label="Close lightbox">
     <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewbox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
     </svg></button> <!-- Previous Button --> <button onclick="prevImage()" class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 z-10 w-12 h-12 flex items-center justify-center rounded-full transition-all duration-300 hover:scale-110" style="background-color: rgba(201, 169, 97, 0.15); color: #f5f5f0; border: 1px solid rgba(201, 169, 97, 0.3);" aria-label="Previous image">
     <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewbox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
     </svg></button> <!-- Next Button --> <button onclick="nextImage()" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 z-10 w-12 h-12 flex items-center justify-center rounded-full transition-all duration-300 hover:scale-110" style="background-color: rgba(201, 169, 97, 0.15); color: #f5f5f0; border: 1px solid rgba(201, 169, 97, 0.3);" aria-label="Next image">
     <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewbox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
     </svg></button> <!-- Image Container -->
    <div class="relative z-0 max-w-5xl max-h-full flex items-center justify-center"><img id="lightbox-image" src="" alt="Gallery image" class="lightbox-image max-w-full max-h-[85%] object-contain rounded-lg shadow-2xl">
    </div><!-- Image Counter -->
    <div id="image-counter" class="absolute bottom-6 left-1/2 -translate-x-1/2 text-sm tracking-widest" style="font-family: 'Montserrat', sans-serif; color: #8a8a85;">
     1 / 9
    </div>
   </div>
  </div>
  <script>
    // Gallery images data - curated Unsplash collection
    const galleryImages = [
      { id: 1, title: 'Mountain Peak', imageUrl: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=800&fit=crop' },
      { id: 2, title: 'Ocean Waves', imageUrl: 'https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=800&h=800&fit=crop' },
      { id: 3, title: 'Forest Path', imageUrl: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=800&fit=crop' },
      { id: 4, title: 'City Lights', imageUrl: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=800&h=800&fit=crop' },
      { id: 5, title: 'Wildlife', imageUrl: 'https://images.unsplash.com/photo-1474511320723-9a56873867b5?w=800&h=800&fit=crop' },
      { id: 6, title: 'Sunset Glow', imageUrl: 'https://images.unsplash.com/photo-1495567720989-cebdbdd97913?w=800&h=800&fit=crop' },
      { id: 7, title: 'Wildflowers', imageUrl: 'https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=800&h=800&fit=crop' },
      { id: 8, title: 'Waterfall', imageUrl: 'https://images.unsplash.com/photo-1433086720051-e4006a0ce696?w=800&h=800&fit=crop' },
      { id: 9, title: 'Desert Dunes', imageUrl: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=800&h=800&fit=crop' }
    ];

    let currentImageIndex = 0;
    
    const defaultConfig = {
      gallery_title: 'Photography Gallery',
      gallery_subtitle: 'A collection of my favorite moments',
      footer_text: '© 2026 Photographer Portfolio',
      background_color: '#0a0a0a',
      text_color: '#f5f5f0',
      accent_color: '#c9a961',
      secondary_text_color: '#8a8a85',
      card_shadow_color: '#000000',
      font_family: 'Cormorant Garamond'
    };

    // Initialize gallery
    function initGallery() {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';
      
      galleryImages.forEach((image, index) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `
          <div class="image-wrapper relative overflow-hidden rounded-lg cursor-pointer group" 
               onclick="openLightbox(${index})"
               style="box-shadow: 0 15px 50px -15px rgba(0,0,0,0.6);">
            <div class="aspect-square overflow-hidden rounded-lg">
              <img src="${image.imageUrl}" 
                   alt="${image.title}" 
                   loading="lazy"
                   class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-110"
                   onerror="this.style.background='#1a1a1a'; this.alt='Image unavailable';">
            </div>
            <div class="absolute inset-0 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center" 
                 style="background: linear-gradient(135deg, rgba(201, 169, 97, 0.15), transparent);">
              <div class="text-center">
                <p class="text-sm font-light tracking-wider mb-2" style="font-family: 'Montserrat', sans-serif; color: #f5f5f0;">${image.title}</p>
                <span style="color: #c9a961;">👁 Click to expand</span>
              </div>
            </div>
          </div>
        `;
        grid.appendChild(item);
      });
    }

    // Lightbox functions
    function openLightbox(index) {
      currentImageIndex = index;
      const lightbox = document.getElementById('lightbox');
      const lightboxImage = document.getElementById('lightbox-image');
      const counter = document.getElementById('image-counter');
      
      lightboxImage.src = galleryImages[index].imageUrl;
      lightboxImage.alt = galleryImages[index].title;
      counter.textContent = `${index + 1} / ${galleryImages.length}`;
      
      lightbox.classList.remove('hidden');
      lightbox.classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.add('hidden');
      lightbox.classList.remove('flex');
      document.body.style.overflow = '';
    }

    function nextImage() {
      currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
      updateLightboxImage();
    }

    function prevImage() {
      currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
      updateLightboxImage();
    }

    function updateLightboxImage() {
      const lightboxImage = document.getElementById('lightbox-image');
      const counter = document.getElementById('image-counter');
      
      lightboxImage.style.opacity = '0';
      setTimeout(() => {
        lightboxImage.src = galleryImages[currentImageIndex].imageUrl;
        lightboxImage.alt = galleryImages[currentImageIndex].title;
        counter.textContent = `${currentImageIndex + 1} / ${galleryImages.length}`;
        lightboxImage.style.opacity = '1';
      }, 150);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const lightbox = document.getElementById('lightbox');
      if (!lightbox.classList.contains('hidden')) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowRight') nextImage();
        if (e.key === 'ArrowLeft') prevImage();
      }
    });

    // Element SDK integration
    async function onConfigChange(config) {
      const c = { ...defaultConfig, ...config };
      
      document.getElementById('gallery-title').textContent = c.gallery_title;
      document.getElementById('gallery-subtitle').textContent = c.gallery_subtitle;
      document.getElementById('footer-text').textContent = c.footer_text;
      
      const wrapper = document.getElementById('app-wrapper');
      wrapper.style.backgroundColor = c.background_color;
      
      document.getElementById('gallery-title').style.color = c.text_color;
      document.getElementById('gallery-title').style.fontFamily = `${c.font_family}, serif`;
      
      document.getElementById('gallery-subtitle').style.color = c.secondary_text_color;
      document.getElementById('footer-text').style.color = c.secondary_text_color;
    }

    function mapToCapabilities(config) {
      const c = { ...defaultConfig, ...config };
      return {
        recolorables: [
          {
            get: () => c.background_color,
            set: (value) => { c.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => c.text_color,
            set: (value) => { c.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => c.accent_color,
            set: (value) => { c.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          },
          {
            get: () => c.secondary_text_color,
            set: (value) => { c.secondary_text_color = value; window.elementSdk.setConfig({ secondary_text_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => c.font_family,
          set: (value) => { c.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
        },
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      const c = { ...defaultConfig, ...config };
      return new Map([
        ['gallery_title', c.gallery_title],
        ['gallery_subtitle', c.gallery_subtitle],
        ['footer_text', c.footer_text]
      ]);
    }

    // Initialize
    initGallery();
    
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>

</html>
