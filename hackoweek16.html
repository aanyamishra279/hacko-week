<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
html, body { height: 100%; margin: 0; }
body { font-family: 'DM Sans', sans-serif; }
.mono { font-family: 'Space Mono', monospace; }
.stack-item { animation: slideIn 0.25s ease-out; }
@keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.task-card { animation: fadeIn 0.2s ease-out; }
.btn-press:active { transform: scale(0.96); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 3px; }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background:#0f0b1e;"><!-- Header -->
   <header class="relative overflow-hidden" style="background: linear-gradient(135deg, #1a1035 0%, #2d1b69 50%, #1a1035 100%);">
    <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 20% 50%, #7c3aed 0%, transparent 50%), radial-gradient(circle at 80% 20%, #6366f1 0%, transparent 40%);"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
     <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
      <div>
       <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#7c3aed,#6366f1);"><i data-lucide="check-square" style="width:20px;height:20px;color:#e0e7ff;"></i>
        </div>
        <h1 id="app-title" class="text-2xl sm:text-3xl font-bold" style="color:#e0e7ff;">Task Manager</h1>
       </div>
       <p id="tagline" class="text-sm sm:text-base ml-13" style="color:#a5b4fc;">Manage tasks and undo mistakes easily</p>
      </div><!-- Undo/Redo Controls -->
      <div class="flex gap-2"><button id="btn-undo" onclick="undoAction()" class="btn-press flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium transition-all disabled:opacity-30" style="background:rgba(124,58,237,0.25);color:#c4b5fd;border:1px solid rgba(124,58,237,0.3);" disabled> <i data-lucide="undo-2" style="width:16px;height:16px;"></i> Undo </button> <button id="btn-redo" onclick="redoAction()" class="btn-press flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium transition-all disabled:opacity-30" style="background:rgba(99,102,241,0.25);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3);" disabled> <i data-lucide="redo-2" style="width:16px;height:16px;"></i> Redo </button>
      </div>
     </div>
    </div>
   </header>
   <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6"><!-- Main Content -->
     <div class="lg:col-span-8 space-y-6"><!-- Add Task Form -->
      <div class="rounded-2xl p-5 sm:p-6" style="background:#1a1233;border:1px solid #2d2255;">
       <h2 class="text-base font-semibold mb-4 flex items-center gap-2" style="color:#c4b5fd;"><i data-lucide="plus-circle" style="width:18px;height:18px;"></i> Add New Task</h2>
       <form id="task-form" onsubmit="addTask(event)" class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div><label for="task-id" class="block text-xs font-medium mb-1" style="color:#7c7a9a;">Task ID</label> <input id="task-id" type="text" placeholder="e.g. T-001" required class="w-full px-3 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500 transition" style="background:#120e24;border:1px solid #2d2255;color:#e0e7ff;">
        </div>
        <div><label for="task-title" class="block text-xs font-medium mb-1" style="color:#7c7a9a;">Task Title</label> <input id="task-title" type="text" placeholder="Enter title" required class="w-full px-3 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500 transition" style="background:#120e24;border:1px solid #2d2255;color:#e0e7ff;">
        </div>
        <div><label for="task-desc" class="block text-xs font-medium mb-1" style="color:#7c7a9a;">Description</label> <input id="task-desc" type="text" placeholder="Brief description" class="w-full px-3 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500 transition" style="background:#120e24;border:1px solid #2d2255;color:#e0e7ff;">
        </div>
        <div class="sm:col-span-3"><button type="submit" class="btn-press flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all hover:brightness-110" style="background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;"> <i data-lucide="plus" style="width:16px;height:16px;"></i> Add Task </button>
        </div>
       </form>
      </div><!-- Task List -->
      <div class="rounded-2xl p-5 sm:p-6" style="background:#1a1233;border:1px solid #2d2255;">
       <h2 class="text-base font-semibold mb-4 flex items-center gap-2" style="color:#c4b5fd;"><i data-lucide="list" style="width:18px;height:18px;"></i> Task List</h2>
       <div id="task-list" class="space-y-3">
        <div id="empty-state" class="text-center py-10" style="color:#5b5780;"><i data-lucide="inbox" style="width:40px;height:40px;margin:0 auto 8px;color:#3b3660;"></i>
         <p class="text-sm">No tasks yet. Add your first task above.</p>
        </div>
       </div>
      </div><!-- Stack Visualization -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
       <div class="rounded-2xl p-5" style="background:#1a1233;border:1px solid #2d2255;">
        <h3 class="text-sm font-semibold mb-3 flex items-center gap-2" style="color:#a78bfa;"><i data-lucide="layers" style="width:15px;height:15px;"></i> Undo Stack</h3>
        <div id="undo-stack-vis" class="space-y-1.5 mono text-xs" style="color:#7c7a9a;">
         <p class="italic text-center py-4" style="color:#3b3660;">Empty</p>
        </div>
       </div>
       <div class="rounded-2xl p-5" style="background:#1a1233;border:1px solid #2d2255;">
        <h3 class="text-sm font-semibold mb-3 flex items-center gap-2" style="color:#818cf8;"><i data-lucide="layers" style="width:15px;height:15px;"></i> Redo Stack</h3>
        <div id="redo-stack-vis" class="space-y-1.5 mono text-xs" style="color:#7c7a9a;">
         <p class="italic text-center py-4" style="color:#3b3660;">Empty</p>
        </div>
       </div>
      </div>
     </div><!-- Sidebar: Activity History -->
     <div class="lg:col-span-4">
      <div class="rounded-2xl p-5 lg:sticky lg:top-6" style="background:#1a1233;border:1px solid #2d2255;">
       <h2 class="text-base font-semibold mb-4 flex items-center gap-2" style="color:#c4b5fd;"><i data-lucide="activity" style="width:18px;height:18px;"></i> Activity History</h2>
       <div id="history-list" class="space-y-2 max-h-96 overflow-auto pr-1">
        <p id="history-empty" class="text-xs text-center py-6" style="color:#3b3660;">No actions yet</p>
       </div>
      </div>
     </div>
    </div>
   </div>
  </div><!-- Edit Modal -->
  <div id="edit-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background:rgba(0,0,0,0.6);">
   <div class="rounded-2xl p-6 w-full max-w-md" style="background:#1a1233;border:1px solid #2d2255;">
    <h3 class="text-base font-semibold mb-4" style="color:#e0e7ff;">Edit Task</h3><input type="hidden" id="edit-idx">
    <div class="space-y-3">
     <div><label for="edit-title" class="block text-xs font-medium mb-1" style="color:#7c7a9a;">Title</label> <input id="edit-title" class="w-full px-3 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500" style="background:#120e24;border:1px solid #2d2255;color:#e0e7ff;">
     </div>
     <div><label for="edit-desc" class="block text-xs font-medium mb-1" style="color:#7c7a9a;">Description</label> <input id="edit-desc" class="w-full px-3 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500" style="background:#120e24;border:1px solid #2d2255;color:#e0e7ff;">
     </div>
    </div>
    <div class="flex gap-2 mt-5"><button onclick="saveEdit()" class="btn-press px-4 py-2 rounded-xl text-sm font-semibold" style="background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;">Save</button> <button onclick="closeEdit()" class="btn-press px-4 py-2 rounded-xl text-sm" style="background:#2d2255;color:#a5b4fc;">Cancel</button>
    </div>
   </div>
  </div><!-- Inline delete confirmation -->
  <div id="delete-confirm" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background:rgba(0,0,0,0.6);">
   <div class="rounded-2xl p-6 w-full max-w-sm text-center" style="background:#1a1233;border:1px solid #2d2255;"><i data-lucide="alert-triangle" style="width:32px;height:32px;color:#f87171;margin:0 auto 12px;"></i>
    <p class="text-sm mb-4" style="color:#e0e7ff;">Delete this task?</p><input type="hidden" id="delete-idx">
    <div class="flex gap-2 justify-center"><button onclick="confirmDelete()" class="btn-press px-4 py-2 rounded-xl text-sm font-semibold" style="background:#dc2626;color:#fff;">Delete</button> <button onclick="closeDelete()" class="btn-press px-4 py-2 rounded-xl text-sm" style="background:#2d2255;color:#a5b4fc;">Cancel</button>
    </div>
   </div>
  </div>
  <script>
let tasks = [];
let undoStack = [];
let redoStack = [];
let history = [];

const defaultConfig = {
  app_title: 'Task Manager',
  tagline: 'Manage tasks and undo mistakes easily',
  background_color: '#0f0b1e',
  surface_color: '#1a1233',
  text_color: '#e0e7ff',
  primary_action_color: '#7c3aed',
  secondary_action_color: '#6366f1',
  font_family: 'DM Sans',
  font_size: 14
};

function applyConfig(config) {
  const t = k => config[k] || defaultConfig[k];
  document.getElementById('app-title').textContent = t('app_title');
  document.getElementById('tagline').textContent = t('tagline');

  const app = document.getElementById('app');
  app.style.background = t('background_color');

  const font = t('font_family');
  const stack = `${font}, 'DM Sans', sans-serif`;
  document.body.style.fontFamily = stack;

  const baseSize = t('font_size') || 14;
  document.getElementById('app-title').style.fontSize = `${baseSize * 2}px`;
  document.getElementById('tagline').style.fontSize = `${baseSize}px`;

  document.querySelectorAll('[style*="background:#1a1233"], [style*="background: #1a1233"]').forEach(el => {
    el.style.background = t('surface_color');
  });
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({primary_action_color:v}); }},
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({secondary_action_color:v}); }},
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({font_family:v}); }},
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({font_size:v}); }}
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title],
    ['tagline', config.tagline || defaultConfig.tagline]
  ])
});

function pushAction(action) {
  undoStack.push(action);
  redoStack = [];
  history.unshift(action);
  updateUI();
}

function addTask(e) {
  e.preventDefault();
  const id = document.getElementById('task-id').value.trim();
  const title = document.getElementById('task-title').value.trim();
  const desc = document.getElementById('task-desc').value.trim();
  if (!id || !title) return;
  const task = { id, title, desc };
  tasks.push(task);
  pushAction({ type: 'add', task: {...task}, index: tasks.length - 1 });
  document.getElementById('task-form').reset();
}

function openEdit(idx) {
  document.getElementById('edit-idx').value = idx;
  document.getElementById('edit-title').value = tasks[idx].title;
  document.getElementById('edit-desc').value = tasks[idx].desc;
  const m = document.getElementById('edit-modal');
  m.classList.remove('hidden');
  m.classList.add('flex');
}
function closeEdit() {
  const m = document.getElementById('edit-modal');
  m.classList.add('hidden');
  m.classList.remove('flex');
}
function saveEdit() {
  const idx = parseInt(document.getElementById('edit-idx').value);
  const old = {...tasks[idx]};
  tasks[idx].title = document.getElementById('edit-title').value.trim();
  tasks[idx].desc = document.getElementById('edit-desc').value.trim();
  pushAction({ type: 'edit', index: idx, oldTask: old, newTask: {...tasks[idx]} });
  closeEdit();
}

function openDelete(idx) {
  document.getElementById('delete-idx').value = idx;
  const m = document.getElementById('delete-confirm');
  m.classList.remove('hidden');
  m.classList.add('flex');
}
function closeDelete() {
  const m = document.getElementById('delete-confirm');
  m.classList.add('hidden');
  m.classList.remove('flex');
}
function confirmDelete() {
  const idx = parseInt(document.getElementById('delete-idx').value);
  const task = {...tasks[idx]};
  tasks.splice(idx, 1);
  pushAction({ type: 'delete', task, index: idx });
  closeDelete();
}

function undoAction() {
  if (!undoStack.length) return;
  const action = undoStack.pop();
  if (action.type === 'add') tasks.splice(action.index, 1);
  else if (action.type === 'delete') tasks.splice(action.index, 0, {...action.task});
  else if (action.type === 'edit') tasks[action.index] = {...action.oldTask};
  redoStack.push(action);
  history.unshift({ type: 'undo', original: action });
  updateUI();
}

function redoAction() {
  if (!redoStack.length) return;
  const action = redoStack.pop();
  if (action.type === 'add') tasks.splice(action.index, 0, {...action.task});
  else if (action.type === 'delete') tasks.splice(action.index, 1);
  else if (action.type === 'edit') tasks[action.index] = {...action.newTask};
  undoStack.push(action);
  history.unshift({ type: 'redo', original: action });
  updateUI();
}

function actionLabel(a) {
  if (a.type === 'undo') return `↩ Undo ${a.original.type}`;
  if (a.type === 'redo') return `↪ Redo ${a.original.type}`;
  if (a.type === 'add') return `+ Added "${a.task.title}"`;
  if (a.type === 'delete') return `− Deleted "${a.task.title}"`;
  if (a.type === 'edit') return `✎ Edited "${a.newTask.title}"`;
  return a.type;
}

function actionColor(a) {
  const t = a.type === 'undo' || a.type === 'redo' ? a.original.type : a.type;
  if (t === 'add') return '#34d399';
  if (t === 'delete') return '#f87171';
  return '#fbbf24';
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const empty = document.getElementById('empty-state');
  if (!tasks.length) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = '';
    return;
  }
  if (empty.parentNode === list) list.removeChild(empty);

  const existing = new Map([...list.children].map(el => [el.dataset.idx, el]));
  const fragment = document.createDocumentFragment();

  tasks.forEach((t, i) => {
    let card = existing.get(String(i));
    if (!card) {
      card = document.createElement('div');
      card.className = 'task-card rounded-xl p-4 flex items-start justify-between gap-3';
      card.style.cssText = 'background:#120e24;border:1px solid #2d2255;';
    }
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 mb-1">
          <span class="mono text-xs px-2 py-0.5 rounded-md" style="background:#2d2255;color:#a78bfa;">${t.id}</span>
          <span class="text-sm font-semibold truncate" style="color:#e0e7ff;">${t.title}</span>
        </div>
        <p class="text-xs truncate" style="color:#7c7a9a;">${t.desc || '—'}</p>
      </div>
      <div class="flex gap-1.5 shrink-0">
        <button onclick="openEdit(${i})" class="btn-press p-2 rounded-lg transition hover:brightness-125" style="background:#2d2255;" aria-label="Edit task"><i data-lucide="pencil" style="width:14px;height:14px;color:#a78bfa;"></i></button>
        <button onclick="openDelete(${i})" class="btn-press p-2 rounded-lg transition hover:brightness-125" style="background:#2d2255;" aria-label="Delete task"><i data-lucide="trash-2" style="width:14px;height:14px;color:#f87171;"></i></button>
      </div>`;
    fragment.appendChild(card);
    existing.delete(String(i));
  });

  existing.forEach(el => el.remove());
  list.innerHTML = '';
  list.appendChild(fragment);
  lucide.createIcons();
}

function renderStacks() {
  const renderStack = (stack, elId) => {
    const el = document.getElementById(elId);
    if (!stack.length) { el.innerHTML = '<p class="italic text-center py-4" style="color:#3b3660;">Empty</p>'; return; }
    el.innerHTML = stack.slice().reverse().map((a, i) => {
      const isTop = i === 0;
      return `<div class="stack-item flex items-center gap-2 px-3 py-1.5 rounded-lg ${isTop ? '' : 'opacity-60'}" style="background:${isTop ? 'rgba(124,58,237,0.15)' : 'rgba(45,34,85,0.5)'};">
        ${isTop ? '<span style="color:#a78bfa;">▸ TOP</span>' : '<span style="color:#3b3660;">·</span>'}
        <span class="truncate">${actionLabel(a)}</span>
      </div>`;
    }).join('');
  };
  renderStack(undoStack, 'undo-stack-vis');
  renderStack(redoStack, 'redo-stack-vis');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  if (!history.length) { el.innerHTML = ''; el.appendChild(empty); return; }
  el.innerHTML = history.slice(0, 20).map(a =>
    `<div class="flex items-center gap-2 px-3 py-2 rounded-lg" style="background:rgba(18,14,36,0.6);">
      <span class="w-1.5 h-1.5 rounded-full shrink-0" style="background:${actionColor(a)};"></span>
      <span class="text-xs truncate" style="color:#a5b4fc;">${actionLabel(a)}</span>
    </div>`
  ).join('');
}

function updateUI() {
  document.getElementById('btn-undo').disabled = !undoStack.length;
  document.getElementById('btn-redo').disabled = !redoStack.length;
  renderTasks();
  renderStacks();
  renderHistory();
}

updateUI();
lucide.createIcons();
</script>
