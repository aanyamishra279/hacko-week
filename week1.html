<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aanya Mishra - Engineering Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
        body {
            box-sizing: border-box;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .page-transition {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .skill-bar {
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-6px);
        }
        
        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: currentColor;
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        .timeline-item {
            position: relative;
            padding-left: 2.5rem;
            animation: slideInLeft 0.6s ease-out;
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.5rem;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 4px currentColor;
            opacity: 0.2;
        }
        
        .timeline-item::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 1.75rem;
            width: 2px;
            height: calc(100% - 1rem);
            background: currentColor;
            opacity: 0.15;
        }
        
        .timeline-item:last-child::after {
            display: none;
        }
        
        @media (max-width: 768px) {
            .mobile-menu {
                display: none;
            }
            
            .mobile-menu.active {
                display: flex;
            }
        }
    </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app" class="w-full h-full"><!-- Navigation -->
   <nav id="navbar" style="box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 100;">
    <div style="max-width: 1200px; margin: 0 auto; padding: 1.25rem 2rem;">
     <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1 id="nav-name" style="font-size: 1.75rem; font-weight: 700; margin: 0; background: linear-gradient(135deg, currentColor, currentColor); -webkit-background-clip: text;"></h1>
      <div style="display: flex; gap: 2.5rem; align-items: center;"><a href="#home" class="nav-link" style="text-decoration: none; font-weight: 500; font-size: 0.95rem;">Home</a> <a href="#about" class="nav-link" style="text-decoration: none; font-weight: 500; font-size: 0.95rem;">About</a> <a href="#skills" class="nav-link" style="text-decoration: none; font-weight: 500; font-size: 0.95rem;">Skills</a> <a href="#projects" class="nav-link" style="text-decoration: none; font-weight: 500; font-size: 0.95rem;">Projects</a> <a href="#education" class="nav-link" style="text-decoration: none; font-weight: 500; font-size: 0.95rem;">Education</a> <a href="#contact" class="nav-link" style="text-decoration: none; font-weight: 500; font-size: 0.95rem;">Contact</a>
      </div>
     </div>
    </div>
   </nav><!-- Main Content -->
   <main id="content" style="max-width: 1200px; margin: 0 auto; padding: 0 2rem;"><!-- Pages will be rendered here -->
   </main><!-- Footer -->
   <footer id="footer" style="margin-top: 5rem; padding: 2.5rem 2rem; text-align: center; border-top: 1px solid rgba(0,0,0,0.08);">
    <p id="footer-text" style="margin: 0; font-size: 0.9rem; font-weight: 400;"></p>
    <p style="margin: 0.5rem 0 0 0; font-size: 0.8rem; opacity: 0.6;">Built with passion for engineering and innovation</p>
   </footer>
  </div>
  <script>
        const defaultConfig = {
            background_color: "#f1f5f9",
            surface_color: "#ffffff",
            text_color: "#0f172a",
            primary_action_color: "#1e3a8a",
            secondary_action_color: "#64748b",
            hero_headline: "Aspiring Engineer & Programmer",
            hero_intro: "Passionate engineering student combining technical expertise with creative problem-solving to build innovative solutions.",
            about_summary: "I'm Aanya Mishra, a dedicated B.Tech student at Symbiosis Institute of Technology with a strong foundation in programming and electronics. With academic excellence from DPS Nagpur and hands-on experience in Arduino and web development, I'm committed to creating impactful technological solutions.",
            student_name: "Aanya Mishra",
            contact_email: "aanya.mishra@email.com",
            linkedin_url: "https://linkedin.com/in/aanyamishra",
            font_family: "Poppins",

        };

        let currentPage = 'home';
        
        const skills = [
            { name: 'C Programming', level: 80 },
            { name: 'HTML & CSS', level: 85 },
            { name: 'JavaScript', level: 75 },

        const projects = [
            {

            },

        ];
        
        const education = [
            {
                title: 'B.Tech in Computer Engineering',
                institution: 'Symbiosis Institute of Technology',
                period: 'Present',

            },

        function renderHomePage(config) {
            const baseSize = config.font_size || defaultConfig.font_size;

                            ${(config.student_name || defaultConfig.student_name).charAt(0)}

                               onmouseout="this.style.background='${config.surface_color}'; this.style.color='${config.primary_action_color}'; this.style.transform='translateY(0)'">

                </div>
            `;

        function renderAboutPage(config) {
            const baseSize = config.font_size || defaultConfig.font_size;
            const customFont = config.font_family || defaultConfig.font_family;
            const baseFontStack = '-apple-system, BlinkMacSystemFont, sans-serif';

                <div class="page-transition" style="padding: 5rem 0;">
                    <h2 style="font-size: ${baseSize * 2.5}px; font-weight: 800; margin-bottom: 3rem; color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack};">About Me</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;">
                        <div>
                            <p style="font-size: ${baseSize * 1.05}px; line-height: 1.9; color: ${config.text_color}; margin-bottom: 1.75rem; font-family: ${customFont}, ${baseFontStack}; font-weight: 400;">
                                ${config.about_summary || defaultConfig.about_summary}
                            </p>
                            <p style="font-size: ${baseSize * 1.05}px; line-height: 1.9; color: ${config.secondary_action_color}; font-family: ${customFont}, ${baseFontStack}; font-weight: 400;">

                            </p>
                            <div style="margin-top: 2.5rem; padding: 1.75rem; background: linear-gradient(135deg, ${config.primary_action_color}15, ${config.primary_action_color}08); border-radius: 16px; border-left: 4px solid ${config.primary_action_color};">

                                    </span>
                                `).join('')}

                            <div style="padding-top: 2rem; border-top: 2px solid ${config.secondary_action_color}20;">
                                <h4 style="font-size: ${baseSize * 1.1}px; font-weight: 600; margin-bottom: 1rem; color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack};">Academic Excellence</h4>
                                <p style="font-size: ${baseSize * 0.95}px; color: ${config.secondary_action_color}; line-height: 1.7; font-family: ${customFont}, ${baseFontStack}; margin-bottom: 1rem;">

                                <p style="font-size: ${baseSize * 0.95}px; color: ${config.secondary_action_color}; line-height: 1.7; font-family: ${customFont}, ${baseFontStack}; margin: 0;">

        function renderSkillsPage(config) {
            const baseSize = config.font_size || defaultConfig.font_size;
            const customFont = config.font_family || defaultConfig.font_family;
            const baseFontStack = '-apple-system, BlinkMacSystemFont, sans-serif';
            
            return `
                <div class="page-transition" style="padding: 5rem 0;">
                    <h2 style="font-size: ${baseSize * 2.5}px; font-weight: 800; margin-bottom: 4rem; color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack};">Skills & Expertise</h2>
                    
                    <div style="margin-bottom: 5rem;">
                        <h3 style="font-size: ${baseSize * 1.75}px; font-weight: 700; margin-bottom: 3rem; color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack};">Technical Skills</h3>

                            ${skills.map(skill => `

                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div>
                        <h3 style="font-size: ${baseSize * 1.75}px; font-weight: 700; margin-bottom: 3rem; color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack};">Soft Skills</h3>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;">
                            ${softSkills.map((skill, index) => `
                                <div class="card-hover" style="background: ${config.surface_color}; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; border-top: 3px solid ${config.primary_action_color};">
                                    <div style="width: 60px; height: 60px; background: linear-gradient(135deg, ${config.primary_action_color}20, ${config.primary_action_color}10); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: ${baseSize * 1.75}px; color: ${config.primary_action_color};">
                                        ${['👥', '💬', '🔄', '🎯', '⏰', '💡'][index]}

                                    <p style="font-size: ${baseSize * 1.05}px; font-weight: 600; color: ${config.text_color}; margin: 0; font-family: ${customFont}, ${baseFontStack};">${skill}</p>

        function renderProjectsPage(config) {

            const baseFontStack = '-apple-system, BlinkMacSystemFont, sans-serif';

        function renderEducationPage(config) {

        function renderContactPage(config) {
            const baseSize = config.font_size || defaultConfig.font_size;

            const baseFontStack = '-apple-system, BlinkMacSystemFont, sans-serif';

        function renderPage(page, config) {
            const content = document.getElementById('content');
            
            switch(page) {
                case 'home':
                    content.innerHTML = renderHomePage(config);
                    break;
                case 'about':
                    content.innerHTML = renderAboutPage(config);
                    break;
                case 'skills':
                    content.innerHTML = renderSkillsPage(config);
                    break;
                case 'projects':
                    content.innerHTML = renderProjectsPage(config);
                    break;
                case 'education':
                    content.innerHTML = renderEducationPage(config);
                    break;
                case 'contact':
                    content.innerHTML = renderContactPage(config);
                    setupContactForm(config);
                    break;
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setupContactForm(config) {
            const form = document.getElementById('contactForm');
            if (form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const messageDiv = document.getElementById('formMessage');
                    const baseSize = config.font_size || defaultConfig.font_size;
                    const customFont = config.font_family || defaultConfig.font_family;
                    const baseFontStack = '-apple-system, BlinkMacSystemFont, sans-serif';
                    
                    messageDiv.style.display = 'block';
                    messageDiv.style.background = config.primary_action_color + '20';
                    messageDiv.style.color = config.primary_action_color;
                    messageDiv.style.fontSize = baseSize * 0.95 + 'px';
                    messageDiv.style.fontFamily = `${customFont}, ${baseFontStack}`;
                    messageDiv.style.borderLeft = '4px solid ' + config.primary_action_color;
                    messageDiv.textContent = '✓ Thank you for reaching out! I\'ll respond to your message shortly.';
                    form.reset();
                    
                    setTimeout(() => {
                        messageDiv.style.display = 'none';
                    }, 5000);
                });
            }
        }

        function updateStyles(config) {
            const navbar = document.getElementById('navbar');
            const footer = document.getElementById('footer');
            const navName = document.getElementById('nav-name');
            const footerText = document.getElementById('footer-text');
            const baseSize = config.font_size || defaultConfig.font_size;
            const customFont = config.font_family || defaultConfig.font_family;
            const baseFontStack = '-apple-system, BlinkMacSystemFont, sans-serif';
            
            document.body.style.background = config.background_color || defaultConfig.background_color;
            document.body.style.color = config.text_color || defaultConfig.text_color;
            document.body.style.fontSize = baseSize + 'px';
            document.body.style.fontFamily = `${customFont}, ${baseFontStack}`;
            
            navbar.style.background = config.surface_color || defaultConfig.surface_color;
            footer.style.background = config.surface_color || defaultConfig.surface_color;
            footer.style.color = config.secondary_action_color || defaultConfig.secondary_action_color;
            
            navName.textContent = config.student_name || defaultConfig.student_name;
            navName.style.color = config.text_color || defaultConfig.text_color;
            navName.style.fontFamily = `${customFont}, ${baseFontStack}`;
            
            footerText.textContent = `© 2024 ${config.student_name || defaultConfig.student_name}. All rights reserved.`;
            footerText.style.fontFamily = `${customFont}, ${baseFontStack}`;
            
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.style.color = config.text_color || defaultConfig.text_color;
                link.style.fontFamily = `${customFont}, ${baseFontStack}`;
                link.addEventListener('mouseover', () => {
                    link.style.color = config.primary_action_color || defaultConfig.primary_action_color;
                });
                link.addEventListener('mouseout', () => {
                    link.style.color = config.text_color || defaultConfig.text_color;
                });
            });
        }
